<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Story Box | Serene Poetry</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Digital Story Box</h1>
    <p class="subtitle">Take a breath. Choose a path. Let the words flow.</p>
  </header>

  <main>
    <section id="button-section">
      <button class="story-btn button" data-type="short">Short Story</button>
      <button class="story-btn button" data-type="medium">Medium Story</button>
      <button class="story-btn button" data-type="poetry">Poetry</button>
      <button class="story-btn button" data-type="fiction">Fiction</button>
      <button class="story-btn button" data-type="surprise">Surprise Me</button>
      <button class="story-btn button ai-btn" data-type="ai">✨ AI Muse</button>
      
      <div class="auth-buttons">
        <button class="signup-btn button auth-btn" onclick="goToSignUp()">Sign Up</button>
        <button class="login-btn button auth-btn" onclick="goToLogin()">Login</button>
      </div>
    </section>

    <p id="status-message" class="status hidden"></p>

    <div id="ai-visualizer" class="hidden">
      <div class="spinner"></div>
      <p>The AI is gathering whispers from the wind...</p>
    </div>

    <section id="story-display" class="hidden">
      <div id="story-card" class="card">
        <h2 id="story-title" class="story-title"></h2>
        <p id="story-author" class="story-author"></p>
        <p id="story-text" class="story-text"></p>
        <p id="story-index" class="story-index"></p>
      </div>

      <div class="interaction-container">
        <div id="rating-section" class="rating-section">
          <p class="rating-label">How did this make you feel?</p>
          <div class="rating-buttons">
            <button class="rate-btn" data-rating="1">&#9733;</button>
            <button class="rate-btn" data-rating="2">&#9733;&#9733;</button>
            <button class="rate-btn" data-rating="3">&#9733;&#9733;&#9733;</button>
          </div>
          <p id="rating-feedback" class="rating-feedback hidden"></p>
        </div>

        <div id="favorite-section" class="rating-section">
          <p class="favorite-label">Keep this close:</p>
          <div class="favorite-buttons">
            <button class="favorite-btn" data-favorite="1">&#10084;</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Hackathon 2026 &copy; A moment of peace</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
